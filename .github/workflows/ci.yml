name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['22', '24', '26']
        include:
          - os: windows-latest
            node-version: '22'
          - os: windows-latest
            node-version: '26'
          - os: macos-26
            node-version: '26'
          - os: macos-26-intel
            node-version: '26'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Pin npm with lifecycle-script policy support
        run: npm install --global npm@11.18.0 --ignore-scripts --no-audit --engine-strict=false

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Report unreviewed lifecycle scripts
        run: npm install-scripts ls --json

      - name: Scan for committed secrets
        run: npm run check:secrets

      - name: Scan all reachable Git history for secrets
        run: npm run check:history-secrets

      - name: Check color-contrast tokens
        run: npm run check:contrast

      - name: Check for placeholder repo slugs
        run: npm run check:placeholders

      - name: Check CTI product scope
        run: npm run check:cti-scope

      - name: Check referenced assets exist
        run: npm run check:assets

      - name: Check score-model gold bands
        run: npm run check:scoring

      - name: Run tests
        run: npm test

      - name: Verify package manifest
        run: npm pack --dry-run

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Pin npm with lifecycle-script policy support
        run: npm install --global npm@11.18.0 --ignore-scripts --no-audit --engine-strict=false

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Report unreviewed lifecycle scripts
        run: npm install-scripts ls --json

      - name: Audit full dependency graph
        run: npm audit --audit-level=high

      - name: Audit production dependency graph
        if: ${{ always() }}
        run: npm audit --omit=dev --audit-level=low

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#070a12">
  <title>BlueTeam.News — defensive intelligence, ready for the floor</title>
  <meta name="description" content="BlueTeam.News — an open-source, self-hosted threat-intelligence desk for cyber defense teams: a glanceable Wall, a scored Wire, and an AI daily briefing.">
  <link rel="stylesheet" href="/fonts.css?v={{BOOT}}">
  <link rel="stylesheet" href="/tokens.css?v={{BOOT}}">
  <link rel="stylesheet" href="/app.css?v={{BOOT}}">
  <link rel="stylesheet" href="/wall.css?v={{BOOT}}">
  <link rel="stylesheet" href="/settings.css?v={{BOOT}}">
  <script id="theme-init">
    (function () {
      try {
        var d = document.documentElement, s = d.style;
        var t = localStorage.getItem('bt-theme');
        // #18: 'light'/'dark' pin a theme; 'system' or an absent key follow the OS
        // (default = follow OS, falling back to dark when prefers-color-scheme is
        // unsupported). Kept FOUC-free and dependency-free.
        if (t === 'light' || t === 'dark') {
          d.dataset.theme = t;
        } else {
          d.dataset.theme = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
        }
        var light = d.dataset.theme === 'light';
        var tcMeta = document.querySelector('meta[name="theme-color"]');
        if (tcMeta) tcMeta.setAttribute('content', light ? '#f5f7fb' : '#070a12');
        var SIG = { '#f87171': 1, '#06b6d4': 1, '#fbbf24': 1, '#a78bfa': 1, '#38bdf8': 1, '#34d399': 1, '#fb923c': 1 };
        var a = (localStorage.getItem('bt-accent') || '').toLowerCase();
        var hex = (/^#[0-9a-f]{6}$/.test(a) && !SIG[a]) ? a : '#3b82f6';
        var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        if (hex !== '#3b82f6') {
          s.setProperty('--brand', hex);
          s.setProperty('--brand-rgb', r + ', ' + g + ', ' + b);
          // Ink on the brand fill: dark suits a bright accent; a mid-dark custom
          // accent needs white or the CTA label drops below AA. 0.0548 = relative
          // luminance of #04101f (the shipped dark ink) + 0.05.
          var lf = function (c) { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
          var Lb = 0.2126 * lf(r) + 0.7152 * lf(g) + 0.0722 * lf(b);
          s.setProperty('--ink-on-brand', (1.05 / (Lb + 0.05)) > ((Lb + 0.05) / 0.0548) ? '#ffffff' : '#04101f');
        }
        var lum = function (R, G, B) { function f(c) { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); } return 0.2126 * f(R) + 0.7152 * f(G) + 0.0722 * f(B); };
        // The DEFAULT accent's --brand-text ships in CSS per theme (#1d4ed8 on light
        // at 6.7:1 / var(--brand) on dark) — never clobber it. Custom accents recompute
        // against the REAL grounds (#eef1f7 light, #0e1320 dark), not pure white (which
        // stops the light loop ~0.3 ratio early and ships below AA).
        if (hex !== '#3b82f6') {
          var rr = r, gg = g, bb = b, i = 0;
          if (light) {
            var bgL = lum(229, 233, 241); // #e5e9f1 (--bg-tertiary) — darkest light ground brand-text renders on
            while (i < 60 && (bgL + 0.05) / (lum(rr, gg, bb) + 0.05) < 4.5) { rr = Math.round(rr * 0.92); gg = Math.round(gg * 0.92); bb = Math.round(bb * 0.92); i++; }
          } else {
            var cardL = lum(22, 28, 44); // #161c2c (--bg-elevated) — lightest dark ground brand-text renders on
            while (i < 60 && (lum(rr, gg, bb) + 0.05) / (cardL + 0.05) < 4.5) { rr = Math.min(255, Math.round(rr * 1.08) + 1); gg = Math.min(255, Math.round(gg * 1.08) + 1); bb = Math.min(255, Math.round(bb * 1.08) + 1); i++; }
          }
          s.setProperty('--brand-text', '#' + [rr, gg, bb].map(function (v) { return v.toString(16).padStart(2, '0'); }).join(''));
        }
      } catch (e) { /* localStorage unavailable — fall back to shipped defaults */ }
    })();
  </script>
  <link rel="icon" href="/favicon.svg?v={{BOOT}}" type="image/svg+xml">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="app-header" id="appHeader"></header>

  <main class="app-main" id="main" tabindex="-1"></main>

  <!-- Wall display mounts here as a full-screen layer -->
  <div class="wall-layer hidden" id="wallLayer" aria-hidden="true"></div>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script type="module" src="/app.js?v={{BOOT}}"></script>
</body>
</html>
